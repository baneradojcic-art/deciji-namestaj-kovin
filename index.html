<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWEET WOOD | Nordic Design & Craftsmanship</title>
    <style>
        :root { 
            --primary: #121212; 
            --accent: #d35400; 
            --bg: #ffffff; 
        }
        
        body { 
            font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            line-height: 1.6; 
            color: var(--primary); 
            background-color: var(--bg); 
            margin: 0; 
            -webkit-font-smoothing: antialiased;
        }
        
        header { 
            padding: 90px 20px; 
            text-align: center; 
            background: #fff;
        }
        header h1 { 
            margin: 0; 
            font-size: clamp(2.5em, 8vw, 4em); 
            letter-spacing: 15px; 
            text-transform: uppercase; 
            font-weight: 200; 
        }
        header p { 
            font-size: 0.8em; 
            letter-spacing: 5px; 
            color: var(--accent); 
            margin-top: 20px; 
            text-transform: uppercase; 
        }

        .hero-section { 
            max-width: 1300px; 
            margin: 0 auto 60px; 
            padding: 0 20px; 
        }
        
        .hero-image { 
            width: 100%; 
            height: auto; 
            max-height: 85vh;
            object-fit: cover; 
            display: block;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .hero-content {
            text-align: center;
            padding: 60px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-text { 
            font-weight: 300; 
            font-size: 1.3em; 
            letter-spacing: 0.5px; 
            color: #444;
            margin-bottom: 50px;
        }

        .btn-katalog { 
            display: inline-block; 
            border: 1px solid var(--primary); 
            color: var(--primary);
            padding: 20px 60px; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-size: 0.85em; 
            transition: all 0.4s ease; 
            background: transparent;
        }
        .btn-katalog:hover { 
            background: var(--primary); 
            color: #fff; 
        }
        
        footer { 
            text-align: center; 
            padding: 100px 20px; 
            color: #aaa; 
            font-size: 0.7em; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            border-top: 1px solid #f5f5f5;
        }
    </style>
</head>
<body>

<header>
    <h1>SWEET WOOD</h1>
    <p>Nordic Minimal</p>
</header>

<div class="hero-section">
    <img src="home-page-slika.jpg" alt="SWEET WOOD dečiji nameštaj od masiva jasena i bukve" class="hero-image">
    
    <div class="hero-content">
        <p class="hero-text">
            Inspirisani Nordic dizajnom, stvaramo nameštaj od plemenitog masiva jasena i bukve. Spoj prirodnih materijala i beskompromisne bezbednosti za vaše dete.
        </p>
        
        <a href="katalog.html" class="btn-katalog">Pogledaj katalog</a>
    </div>
</div>

<footer>&copy; 2026 SWEET WOOD. Designed to last.</footer>

</body>
</html>
